preprocess:
  test_size: 0.2
  random_state: 42

train:
  model: random_forest   # logistic_regression | naive_bayes | random_forest
  max_features: 20000
  ngram_max: 2
  imbalance_strategy: class_weight   # class_weight | smote | none
  random_state: 42
  n_estimators: 200   # trouvé par GridSearchCV, partie 6
  max_depth: null   # trouvé par GridSearchCV, partie 6 (null = profondeur illimitée)

evaluate:
  cv_folds: 5
